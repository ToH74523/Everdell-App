<!DOCTYPE html>
<html>
<head>
    <title>Icon Generator</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f7f3e9; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: #4a7c59; }
        .icons { display: flex; flex-wrap: wrap; gap: 20px; margin: 20px 0; }
        .icon-box { text-align: center; }
        canvas { border: 1px solid #ccc; border-radius: 10px; }
        button { background: #4a7c59; color: white; padding: 10px 20px; border: none; 
                 border-radius: 5px; cursor: pointer; margin: 5px; }
        button:hover { background: #2d5a27; }
        .download-all { background: #d4a574; font-size: 18px; padding: 15px 30px; }
        #status { margin-top: 20px; padding: 10px; background: #e8f5e9; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Everdell Icon Generator</h1>
        <p>Klicke auf die Buttons um die Icons herunterzuladen:</p>
        <button class="download-all" onclick="downloadAll()">Alle Icons herunterladen</button>
        <div class="icons" id="icons"></div>
        <div id="status"></div>
    </div>

    <script>
        const svgContent = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
            <defs>
                <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#4a7c59"/>
                    <stop offset="100%" style="stop-color:#2d5a27"/>
                </linearGradient>
                <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#d4a574"/>
                    <stop offset="100%" style="stop-color:#b8865c"/>
                </linearGradient>
            </defs>
            <circle cx="256" cy="256" r="240" fill="url(#bgGrad)"/>
            <circle cx="256" cy="256" r="220" fill="#f7f3e9" opacity="0.08"/>
            <ellipse cx="256" cy="320" rx="130" ry="100" fill="url(#bodyGrad)"/>
            <g fill="#5c4033">
                <polygon points="140,280 160,220 180,280"/>
                <polygon points="170,260 195,190 220,260"/>
                <polygon points="210,250 240,170 270,250"/>
                <polygon points="260,245 295,165 330,245"/>
                <polygon points="320,255 355,185 390,255"/>
                <polygon points="355,280 375,230 395,280"/>
            </g>
            <ellipse cx="256" cy="310" rx="90" ry="70" fill="#f5d5b8"/>
            <ellipse cx="256" cy="340" rx="60" ry="40" fill="#fff5e6"/>
            <circle cx="220" cy="290" r="20" fill="#fff"/>
            <circle cx="292" cy="290" r="20" fill="#fff"/>
            <circle cx="225" cy="293" r="12" fill="#2c1810"/>
            <circle cx="297" cy="293" r="12" fill="#2c1810"/>
            <circle cx="228" cy="290" r="4" fill="#fff"/>
            <circle cx="300" cy="290" r="4" fill="#fff"/>
            <ellipse cx="256" cy="320" rx="10" ry="7" fill="#2c1810"/>
            <path d="M242 332 Q256 342 270 332" stroke="#2c1810" stroke-width="3" fill="none" stroke-linecap="round"/>
            <ellipse cx="215" cy="308" rx="15" ry="8" fill="#ffb6c1" opacity="0.5"/>
            <ellipse cx="297" cy="308" rx="15" ry="8" fill="#ffb6c1" opacity="0.5"/>
            <circle cx="256" cy="270" r="5" fill="#2c1810"/>
            <circle cx="240" cy="255" r="3" fill="#2c1810"/>
            <circle cx="272" cy="255" r="3" fill="#2c1810"/>
            <ellipse cx="190" cy="320" rx="25" ry="15" fill="#d4a574"/>
            <ellipse cx="322" cy="320" rx="25" ry="15" fill="#d4a574"/>
        </svg>`;

        const sizes = [72, 96, 128, 144, 152, 167, 180, 192, 384, 512];
        const container = document.getElementById('icons');

        function createCanvas(size) {
            const box = document.createElement('div');
            box.className = 'icon-box';
            
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            
            const ctx = canvas.getContext('2d');
            const img = new Image();
            const blob = new Blob([svgContent], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);
            
            img.onload = () => {
                ctx.drawImage(img, 0, 0, size, size);
                URL.revokeObjectURL(url);
            };
            img.src = url;
            
            const label = document.createElement('div');
            label.textContent = `${size}x${size}`;
            
            const btn = document.createElement('button');
            btn.textContent = 'Download';
            btn.onclick = () => downloadIcon(canvas, size);
            
            box.appendChild(canvas);
            box.appendChild(label);
            box.appendChild(btn);
            container.appendChild(box);
            
            return canvas;
        }

        function downloadIcon(canvas, size) {
            const link = document.createElement('a');
            link.download = `icon-${size}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        async function downloadAll() {
            const status = document.getElementById('status');
            status.textContent = 'Generiere Icons...';
            
            const canvases = document.querySelectorAll('canvas');
            let delay = 0;
            
            for (const canvas of canvases) {
                await new Promise(r => setTimeout(r, 300));
                const size = canvas.width;
                const link = document.createElement('a');
                link.download = `icon-${size}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                await new Promise(r => setTimeout(r, 200));
            }
            
            status.textContent = 'Alle Icons wurden heruntergeladen! Verschiebe sie in den icons/ Ordner.';
        }

        sizes.forEach(createCanvas);
    </script>
</body>
</html>
