<!DOCTYPE html>
<html>
<head>
    <title>Icon Generator</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f7f3e9; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: #4a7c59; }
        .icons { display: flex; flex-wrap: wrap; gap: 20px; margin: 20px 0; }
        .icon-box { text-align: center; }
        canvas { border: 1px solid #ccc; border-radius: 10px; }
        button { background: #4a7c59; color: white; padding: 10px 20px; border: none; 
                 border-radius: 5px; cursor: pointer; margin: 5px; }
        button:hover { background: #2d5a27; }
        .download-all { background: #d4a574; font-size: 18px; padding: 15px 30px; }
        #status { margin-top: 20px; padding: 10px; background: #e8f5e9; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Everdell Icon Generator</h1>
        <p>Klicke auf die Buttons um die Icons herunterzuladen:</p>
        <button class="download-all" onclick="downloadAll()">Alle Icons herunterladen</button>
        <div class="icons" id="icons"></div>
        <div id="status"></div>
    </div>

    <script>
        const svgContent = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
            <defs>
                <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#4a7c59"/>
                    <stop offset="100%" style="stop-color:#2d5a27"/>
                </linearGradient>
                <linearGradient id="furGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#d4a574"/>
                    <stop offset="100%" style="stop-color:#b8865c"/>
                </linearGradient>
            </defs>
            <circle cx="256" cy="256" r="240" fill="url(#bgGrad)"/>
            <circle cx="256" cy="256" r="220" fill="#f7f3e9" opacity="0.1"/>
            <ellipse cx="256" cy="300" rx="85" ry="100" fill="url(#furGrad)"/>
            <ellipse cx="256" cy="200" rx="70" ry="65" fill="url(#furGrad)"/>
            <ellipse cx="200" cy="120" rx="25" ry="45" fill="#d4a574" transform="rotate(-20 200 120)"/>
            <ellipse cx="312" cy="120" rx="25" ry="45" fill="#d4a574" transform="rotate(20 312 120)"/>
            <ellipse cx="200" cy="115" rx="18" ry="35" fill="#f5d5b8" transform="rotate(-20 200 115)"/>
            <ellipse cx="312" cy="115" rx="18" ry="35" fill="#f5d5b8" transform="rotate(20 312 115)"/>
            <ellipse cx="220" cy="185" rx="18" ry="20" fill="#fff"/>
            <ellipse cx="292" cy="185" rx="18" ry="20" fill="#fff"/>
            <circle cx="223" cy="188" r="10" fill="#2c1810"/>
            <circle cx="295" cy="188" r="10" fill="#2c1810"/>
            <circle cx="226" cy="185" r="3" fill="#fff"/>
            <circle cx="298" cy="185" r="3" fill="#fff"/>
            <ellipse cx="256" cy="210" rx="12" ry="8" fill="#2c1810"/>
            <path d="M244 222 Q256 232 268 222" stroke="#2c1810" stroke-width="3" fill="none" stroke-linecap="round"/>
            <ellipse cx="235" cy="205" rx="12" ry="6" fill="#ffb6c1" opacity="0.6"/>
            <ellipse cx="277" cy="205" rx="12" ry="6" fill="#ffb6c1" opacity="0.6"/>
            <path d="M256 250 Q220 320 256 380 Q292 320 256 250" fill="url(#furGrad)"/>
            <path d="M180 350 Q120 380 100 450" stroke="#d4a574" stroke-width="35" fill="none" stroke-linecap="round"/>
            <path d="M332 350 Q392 380 412 450" stroke="#d4a574" stroke-width="35" fill="none" stroke-linecap="round"/>
            <circle cx="256" cy="165" rx="4" ry="3" fill="#2c1810"/>
        </svg>`;

        const sizes = [72, 96, 128, 144, 152, 167, 180, 192, 384, 512];
        const container = document.getElementById('icons');

        function createCanvas(size) {
            const box = document.createElement('div');
            box.className = 'icon-box';
            
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            
            const ctx = canvas.getContext('2d');
            const img = new Image();
            const blob = new Blob([svgContent], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);
            
            img.onload = () => {
                ctx.drawImage(img, 0, 0, size, size);
                URL.revokeObjectURL(url);
            };
            img.src = url;
            
            const label = document.createElement('div');
            label.textContent = `${size}x${size}`;
            
            const btn = document.createElement('button');
            btn.textContent = 'Download';
            btn.onclick = () => downloadIcon(canvas, size);
            
            box.appendChild(canvas);
            box.appendChild(label);
            box.appendChild(btn);
            container.appendChild(box);
            
            return canvas;
        }

        function downloadIcon(canvas, size) {
            const link = document.createElement('a');
            link.download = `icon-${size}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        async function downloadAll() {
            const status = document.getElementById('status');
            status.textContent = 'Generiere Icons...';
            
            const canvases = document.querySelectorAll('canvas');
            let delay = 0;
            
            for (const canvas of canvases) {
                await new Promise(r => setTimeout(r, 300));
                const size = canvas.width;
                const link = document.createElement('a');
                link.download = `icon-${size}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                await new Promise(r => setTimeout(r, 200));
            }
            
            status.textContent = 'Alle Icons wurden heruntergeladen! Verschiebe sie in den icons/ Ordner.';
        }

        sizes.forEach(createCanvas);
    </script>
</body>
</html>
